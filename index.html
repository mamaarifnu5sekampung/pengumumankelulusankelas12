        function App() {
            const [searchQuery, setSearchQuery] = useState('');
            const [studentData, setStudentData] = useState([]);
            const [result, setResult] = useState(null);
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState('');

            useEffect(() => {
                const lines = CSV_DATA.trim().split('\n');
                const headers = lines[0].split(',');
                const data = lines.slice(1).map(line => {
                    const values = line.split(',');
                    const obj = {};
                    headers.forEach((header, i) => {
                        obj[header.trim()] = values[i]?.trim();
                    });
                    return obj;
                });
                setStudentData(data);
                
                // Initialize Lucide icons
                setTimeout(() => lucide.createIcons(), 100);
            }, []);

            const handleSearch = (e) => {
                e.preventDefault();
                if (!searchQuery.trim()) return;

                setLoading(true);
                setError('');
                setResult(null);

                setTimeout(() => {
                    const found = studentData.find(
                        s => s.NISN === searchQuery.trim() || s.Nama.toUpperCase() === searchQuery.toUpperCase()
                    );

                    if (found) {
                        setResult(found);
                    } else {
                        setError('Data tidak ditemukan. Pastikan NISN atau Nama yang dimasukkan benar (gunakan huruf kapital untuk nama).');
                    }
                    setLoading(false);
                    setTimeout(() => lucide.createIcons(), 50);
                }, 800);
            };

            const isLulus = result?.Status?.toUpperCase() === 'LULUS';

            return (
                <div className="min-h-screen flex flex-col">
                    {/* Header */}
                    <nav className="bg-white border-b border-emerald-100 sticky top-0 z-50 no-print">
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                            <div className="flex justify-between h-20 items-center">
                                <div className="flex items-center gap-4">
                                    <img src="logo.jpeg" alt="Logo" className="h-12 w-auto object-contain" 
                                         onError={(e) => e.target.style.display = 'none'} />
                                    <div className="border-l border-emerald-100 pl-4">
                                        <h1 className="text-lg font-black leading-none text-emerald-800 uppercase tracking-tight">
                                            MA Ma'arif NU 5 Sekampung
                                        </h1>
                                        <p className="text-[10px] text-emerald-600 font-bold mt-1 tracking-widest uppercase">
                                            Portal Kelulusan Digital 2026
                                        </p>
                                    </div>
                                </div>
                                <div className="hidden md:block">
                                    <span className="inline-flex items-center px-4 py-2 rounded-full text-xs font-bold bg-emerald-600 text-white shadow-sm">

                                </div>
                            </div>
                        </div>
                    </nav>

                            </h2>

                            </p>
                        </div>

                        {/* Search Card */}
                        <div className="bg-white rounded-[2.5rem] shadow-xl shadow-emerald-200/40 p-6 md:p-10 mb-8 border border-emerald-50 no-print">

                                <div className="flex flex-col md:flex-row gap-4">
                                    <div className="relative flex-1">
                                        <div className="absolute inset-y-0 left-0 pl-5 flex items-center pointer-events-none text-emerald-400">
                                            <i data-lucide="search" size="22"></i>
                                        </div>
                                        <input
                                            type="text"
                                            className="block w-full pl-14 pr-4 py-5 bg-emerald-50/50 border-2 border-emerald-100 rounded-2xl focus:ring-4 focus:ring-emerald-500/10 focus:border-emerald-500 transition-all outline-none text-xl font-bold text-emerald-900"
                                            placeholder="Masukkan NISN/NAMA LENGKAP ANDA"
                                            value={searchQuery}
                                            onChange={(e) => setSearchQuery(e.target.value)}

                                        type="submit"
                                        disabled={loading}

                                    </ul>
                                </div>
                            </div>

                        {result && (
                            <div className="animate-in fade-in zoom-in duration-500">

                                        <div className="inline-flex p-5 bg-white/25 rounded-[2rem] mb-4 backdrop-blur-xl border border-white/30">
                                            {isLulus ? <i data-lucide="check-circle-2" size="64"></i> : <i data-lucide="x-circle" size="64"></i>}
                                        </div>
                                        <h3 className="text-4xl font-black uppercase tracking-widest mb-2">
                                            {isLulus ? 'LULUS' : 'TIDAK LULUS'}
                                        </h3>
                                        <p className="text-white/80 font-bold tracking-widest text-sm uppercase">Sidang Pleno Kelulusan 2026</p>
                                    </div>

                                    <div className="p-10">
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-10 mb-10">
                                            <div className="space-y-6">
                                                <div className="flex items-center gap-4">
                                                    <div className="p-3 bg-emerald-50 rounded-2xl text-emerald-600"><i data-lucide="user"></i></div>
                                                    <div>
                                                        <p className="text-[11px] font-black text-emerald-400 uppercase tracking-widest">Nama Peserta</p>
                                                        <p className="text-xl font-black text-slate-800">{result.Nama}</p>
                                                    </div>
                                                </div>
                                                <div className="flex items-center gap-4">
                                                    <div className="p-3 bg-emerald-50 rounded-2xl text-emerald-600"><i data-lucide="hash"></i></div>
                                                    <div>
                                                        <p className="text-[11px] font-black text-emerald-400 uppercase tracking-widest">NISN</p>
                                                        <p className="text-xl font-black text-slate-800 tracking-wider">{result.NISN}</p>
                                                    </div>
                                                </div>
                                            </div>
                                            <div className="space-y-6">
                                                <div className="flex items-center gap-4">
                                                    <div className="p-3 bg-emerald-50 rounded-2xl text-emerald-600"><i data-lucide="calendar"></i></div>
                                                    <div>
                                                        <p className="text-[11px] font-black text-emerald-400 uppercase tracking-widest">Tahun Lulus</p>
                                                        <p className="text-xl font-black text-slate-800">2026</p>
                                                    </div>
                                                </div>
                                                <div className="flex items-center gap-4">
                                                    <div className="p-3 bg-emerald-50 rounded-2xl text-emerald-600"><i data-lucide="info"></i></div>
                                                    <div>
                                                        <p className="text-[11px] font-black text-emerald-400 uppercase tracking-widest">Status Data</p>
                                                        <p className="text-xl font-black text-emerald-600">Resmi & Valid</p>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>

                                        <div className="bg-emerald-50/50 rounded-[2rem] p-8 border border-emerald-100 mb-10 text-center">
                                            <p className="text-xl italic font-medium text-emerald-900 leading-relaxed">
                                                "{result.Pesan}"
                                            </p>
                                        </div>

                                        <div className="flex flex-col sm:flex-row gap-5 no-print">
                                            <button 
                                                onClick={() => window.print()}
                                                className="flex-1 flex items-center justify-center gap-3 py-5 px-8 bg-emerald-800 hover:bg-emerald-950 text-white rounded-2xl font-black text-lg transition-all"
                                            >
                                                <i data-lucide="download"></i> CETAK BUKTI
                                            </button>
                                         
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>

                    <footer className="py-12 bg-white border-t border-emerald-50 text-center no-print">
                        <img src="logo.jpeg" alt="Logo Footer" className="h-16 w-auto mx-auto mb-4 opacity-50" 
                             onError={(e) => e.target.style.display = 'none'} />
                        <span className="font-black text-emerald-900 text-lg block">MA MA'ARIF NU 5 SEKAMPUNG</span>
                        <p className="text-emerald-800/40 text-xs font-medium mt-2">
                            &copy; 2026 Tim IT Madrasah. Seluruh hak cipta dilindungi.
                        </p>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
